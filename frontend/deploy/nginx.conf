# Mindfield static site — SPA fallback to /index.html so React Router routes
# (/play/:gameId, /session/:id/profile) survive a hard reload. /api is NOT
# served here — Caddy on the edge routes /api/* to the api container.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri /index.html;
    }
}
